name: Publish Chrome Extensions

# ── Triggers ────────────────────────────────────────────────────
# 1. Manual dispatch (primary) — click "Run workflow" in GitHub Actions UI
# 2. Push tags like "ext-v1.3.0" for automated releases
on:
  workflow_dispatch:
    inputs:
      extensions:
        description: 'Which extensions to publish'
        required: true
        type: choice
        default: 'all'
        options:
          - all
          - chatgpt
          - gemini
          - grok
          - deviantart
      publish:
        description: 'Publish to Chrome Web Store (uncheck for build-only)'
        required: true
        type: boolean
        default: true

  push:
    tags:
      - 'ext-v*'

# ── Environment ─────────────────────────────────────────────────
env:
  NODE_VERSION: '20'

jobs:
  build:
    name: Build & Publish Extensions
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        extension:
          - name: chatgpt
            package: '@opalite/chatgpt-extension'
            cws_id_secret: CWS_ID_CHATGPTEXT
          - name: gemini
            package: '@opalite/gemini-extension'
            cws_id_secret: CWS_ID_GEMINIEXT
          - name: grok
            package: '@opalite/grok-extension'
            cws_id_secret: CWS_ID_GROKEXT
          - name: deviantart
            package: '@opalite/deviantart-extension'
            cws_id_secret: CWS_ID_DA_STASH_HELPER

    steps:
      - name: Check if this extension should run
        id: check
        env:
          TARGET: ${{ inputs.extensions || 'all' }}
          CURRENT: ${{ matrix.extension.name }}
        run: |
          if [ "$TARGET" = "all" ] || [ "$TARGET" = "$CURRENT" ]; then
            echo "skip=false" >> "$GITHUB_OUTPUT"
          else
            echo "skip=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.check.outputs.skip != 'true'
        uses: actions/checkout@v4

      - name: Setup Node.js
        if: steps.check.outputs.skip != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        if: steps.check.outputs.skip != 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        if: steps.check.outputs.skip != 'true'
        run: pnpm install --frozen-lockfile

      # ── Build ──
      - name: Build extension
        if: steps.check.outputs.skip != 'true'
        env:
          FILTER: ${{ matrix.extension.package }}
        run: pnpm --filter "$FILTER" build

      # ── Zip ──
      - name: Create zip
        if: steps.check.outputs.skip != 'true'
        env:
          FILTER: ${{ matrix.extension.package }}
        run: pnpm --filter "$FILTER" zip

      # ── Find zip path (absolute, since wxt submit runs from app dir) ──
      - name: Find zip file
        if: steps.check.outputs.skip != 'true'
        id: zip
        run: |
          ZIP_FILE=$(ls "$GITHUB_WORKSPACE/apps/${{ matrix.extension.name }}/.output/"*.zip 2>/dev/null | head -1)
          echo "path=$ZIP_FILE" >> "$GITHUB_OUTPUT"

      # ── Publish to Chrome Web Store ──
      - name: Publish to CWS
        if: steps.check.outputs.skip != 'true' && inputs.publish != false && github.event_name != 'pull_request'
        env:
          FILTER: ${{ matrix.extension.package }}
          CHROME_ZIP: ${{ steps.zip.outputs.path }}
          CHROME_EXTENSION_ID: ${{ secrets[matrix.extension.cws_id_secret] }}
          CHROME_CLIENT_ID: ${{ secrets.CWS_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CWS_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CWS_REFRESH_TOKEN }}
        run: pnpm --filter "$FILTER" submit

      # ── Upload zip as artifact ──
      - name: Upload build artifact
        if: always() && steps.check.outputs.skip != 'true'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.extension.name }}-extension
          path: apps/${{ matrix.extension.name }}/.output/*.zip
          retention-days: 30
          if-no-files-found: warn
