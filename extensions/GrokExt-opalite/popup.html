<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Grok Suite</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        width: 340px;
        background: #0B0C10;
        color: #e5e7eb;
        font-family: Inter, system-ui, -apple-system, sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }
      .header {
        padding: 16px 20px 12px;
        border-bottom: 1px solid rgba(255,255,255,0.1);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logo-group {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .logo-icon {
        width: 20px;
        height: 20px;
      }
      .logo {
        font-size: 18px;
        font-weight: 700;
        background: linear-gradient(to right, #f43f5e, #f97316, #eab308);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .platform-badge {
        font-size: 11px;
        color: #9ca3af;
        background: rgba(255,255,255,0.08);
        padding: 2px 8px;
        border-radius: 9999px;
      }
      .content { padding: 16px 20px; }
      .status-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; }
      .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
      .status-dot.online { background: #22c55e; }
      .status-dot.warning { background: #eab308; }
      .status-dot.offline { background: #ef4444; }
      .status-text { font-size: 13px; color: #9ca3af; }
      .user-info {
        display: flex; align-items: center; gap: 10px; padding: 12px;
        background: rgba(255,255,255,0.05);
        border: 1px solid rgba(255,255,255,0.1);
        border-radius: 12px; margin-bottom: 12px;
      }
      .avatar {
        width: 36px; height: 36px; border-radius: 50%;
        background: linear-gradient(135deg, #f43f5e, #f97316, #eab308);
        display: flex; align-items: center; justify-content: center;
        font-weight: 600; font-size: 15px; color: white; flex-shrink: 0;
      }
      .user-name { font-weight: 500; color: #e5e7eb; }
      .user-email { font-size: 11px; color: #71717a; margin-top: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 220px; }
      .plan-badge {
        font-size: 11px; text-transform: capitalize; padding: 1px 6px; border-radius: 4px;
        background: rgba(244, 63, 94, 0.15); color: #f97316;
      }
      .actions { display: flex; flex-direction: column; gap: 8px; }
      .btn {
        display: block; width: 100%; padding: 10px; border: none; border-radius: 10px;
        font-size: 13px; font-weight: 500; cursor: pointer; text-align: center; text-decoration: none;
        font-family: Inter, system-ui, -apple-system, sans-serif;
      }
      .btn-primary {
        background: linear-gradient(135deg, #f43f5e, #f97316, #eab308); color: white;
        box-shadow: 0 4px 14px -3px rgba(244,63,94,0.4);
      }
      .btn-primary:hover { filter: brightness(1.1); }
      .btn-secondary {
        background: rgba(255,255,255,0.05); color: #e5e7eb;
        border: 1px solid rgba(255,255,255,0.1);
      }
      .btn-secondary:hover { background: rgba(255,255,255,0.1); }
      .btn-danger { background: transparent; color: #9ca3af; font-size: 12px; padding: 6px; }
      .btn-danger:hover { color: #ef4444; }
      .wrong-site { text-align: center; padding: 20px; color: #9ca3af; }
      .wrong-site a { color: #f97316; text-decoration: none; }
      .wrong-site a:hover { text-decoration: underline; }
      .footer { padding: 10px 20px; border-top: 1px solid rgba(255,255,255,0.08); text-align: center; }
      .footer a { font-size: 11px; color: #71717a; text-decoration: none; }
      .footer a:hover { color: #9ca3af; }
      .link-row { display: flex; justify-content: center; gap: 12px; margin-top: 4px; }
      .link-row a { font-size: 11px; color: #71717a; text-decoration: none; }
      .link-row a:hover { color: #f97316; }
      .top-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
      .top-row .status-row { margin-bottom: 0; }
      .dashboard-link { color: #71717a; padding: 4px; border-radius: 4px; display: flex; align-items: center; transition: color 0.15s; }
      .dashboard-link:hover { color: #f97316; }
      .status-dot.idle { background: #71717a; }
      #loading { text-align: center; padding: 40px 20px; color: #71717a; }
      .plan-paid { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
      .usage-section { margin-bottom: 12px; }
      .usage-label { font-size: 11px; color: #9ca3af; margin-bottom: 4px; }
      .usage-bar { height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; overflow: hidden; }
      .usage-fill { height: 100%; border-radius: 2px; transition: width 0.3s; }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo-group">
        <img class="logo-icon" src="./images/icon-32.png" alt="">
        <span class="logo">Grok Suite</span>
      </div>
      <span class="platform-badge">Grok</span>
    </div>
    <div id="loading">Loading...</div>
    <div id="main-content" style="display:none;"></div>
    <div class="footer">
      <a href="https://opalitestudios.com/support" target="_blank" rel="noopener noreferrer">Help & Support</a>
    </div>
    <script src="./popup.js"></script>
  </body>
</html>
