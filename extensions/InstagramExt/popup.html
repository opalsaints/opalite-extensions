<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Opalite</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body {
        width: 340px;
        background: #0a0a0a;
        color: #e4e4e7;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        font-size: 14px;
        line-height: 1.5;
      }
      .header {
        padding: 16px 20px 12px;
        border-bottom: 1px solid #27272a;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .logo {
        font-size: 18px;
        font-weight: 700;
        background: linear-gradient(to right, #8b5cf6, #a855f7);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }
      .platform-badge {
        font-size: 11px;
        color: #a1a1aa;
        background: #27272a;
        padding: 2px 8px;
        border-radius: 9999px;
      }
      .content { padding: 16px 20px; }
      .status-row {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }
      .status-dot {
        width: 8px; height: 8px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .status-dot.online { background: #22c55e; }
      .status-dot.offline { background: #ef4444; }
      .status-text { font-size: 13px; color: #a1a1aa; }
      .user-info {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px;
        background: #18181b;
        border-radius: 8px;
        margin-bottom: 12px;
      }
      .avatar {
        width: 36px; height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 600;
        font-size: 15px;
        color: white;
        flex-shrink: 0;
      }
      .user-name { font-weight: 500; color: #e4e4e7; }
      .plan-badge {
        font-size: 11px;
        text-transform: capitalize;
        padding: 1px 6px;
        border-radius: 4px;
        background: rgba(139, 92, 246, 0.2);
        color: #a78bfa;
      }
      .actions { display: flex; flex-direction: column; gap: 8px; }
      .btn {
        display: block;
        width: 100%;
        padding: 10px;
        border: none;
        border-radius: 8px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        text-align: center;
        text-decoration: none;
      }
      .btn-primary {
        background: linear-gradient(135deg, #833ab4, #fd1d1d, #fcb045);
        color: white;
      }
      .btn-primary:hover { opacity: 0.9; }
      .btn-secondary {
        background: #27272a;
        color: #e4e4e7;
        border: 1px solid #3f3f46;
      }
      .btn-secondary:hover { background: #3f3f46; }
      .btn-danger {
        background: transparent;
        color: #a1a1aa;
        font-size: 12px;
        padding: 6px;
      }
      .btn-danger:hover { color: #ef4444; }
      .wrong-site {
        text-align: center;
        padding: 20px;
        color: #a1a1aa;
      }
      .wrong-site a { color: #a78bfa; text-decoration: none; }
      .wrong-site a:hover { text-decoration: underline; }
      .footer {
        padding: 10px 20px;
        border-top: 1px solid #27272a;
        text-align: center;
      }
      .footer a {
        font-size: 11px;
        color: #71717a;
        text-decoration: none;
      }
      .footer a:hover { color: #a1a1aa; }
      #loading { text-align: center; padding: 40px 20px; color: #71717a; }
    </style>
  </head>
  <body>
    <div class="header">
      <span class="logo">Opalite</span>
      <span class="platform-badge">Instagram</span>
    </div>
    <div id="loading">Loading...</div>
    <div id="main-content" style="display:none;"></div>
    <div class="footer">
      <a href="https://opalitestudios.com/support" target="_blank" rel="noopener noreferrer">Help & Support</a>
    </div>
    <script src="./popup.js"></script>
  </body>
</html>
